<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8">
            <title>TV Time | Shows</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <script src="https://kit.fontawesome.com/88a54f208d.js" crossorigin="anonymous"></script>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
        </head>
        <body class = "bg-sky-50">
            <div class="p-4">
                <nav class="container mx-auto flex rounded-full bg-sky-200 p-3">
                    <div class="container mx-auto px-4 gap-4 py-2">
                        <a class="text-xl font-semibold text-gray-800 brand-link pl-70 hover:scale-110 hover:tracking-wider transition-all" href="index.html">TV Time</a>
                    </div>
                    <button class="md:hidden items-center p-2 rounded text-gray-800 hover:bg-sky-300 ml-auto" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="hidden md:block container mx-auto px-4 text-right md:gap-4 py-2">
                        <a class="text-l font-semibold text-gray-800 brand-link px-4 py-2 md:py-0 hover:text-blue-600" href="tv.html"><i class="fa-solid fa-film"></i>Shows</a>
                        <a class="text-l font-semibold text-gray-800 brand-link px-4 py-2 md:py-0 hover:text-blue-600" href="actors.html"><i class="fa-solid fa-user"></i>Actors</a>
                    </div>
                </nav>
            </div>
            <nav class="container mx-auto items-center">
                <h1 class="text-center font-bold text-xl text-gray-800">Shows</h1>
                <p class="text-base text-gray-800 text-center">Browse through shows or search for fan-favourites!</p>
            </nav>
            <form id="search-form" class ="mx-auto w-full mt-4 px-4 md:w-3/4 lg:w-1/2" onSubmit="searchTV(event)">
                <div class="grid grid-cols-1 gap-2 sm:grid-cols-9 sm:gap-0">
                    <input class="sm:col-span-8 rounded-full font-semibold text-gray-800 bg-sky-100 px-4 w-full h-full sm:rounded-l-full sm:rounded-r-none" type="text" placeholder="Search" name="Search" id="keyword"/>
                    <button class="h-full w-full rounded-full bg-sky-200 sm:rounded-r-full sm:rounded-l-none hover:bg-sky-300">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </button>
                </div>
            </form>
            <div class="">
                <div class="">
                    <div class="grid grid-cols-1 lg:grid-cols-4 gap-3 py-4 text-center m-4" id="results" onSubmit="showShows()">

                    </div>
                </div>
            </div>
            <div class="flex gap-6 m-6">
                <button class="container mx-auto rounded-full bg-sky-200 p-6 text-center hover:bg-sky-300" onclick="previousButton()" id="prev">Prev</button>
                <button class="container mx-auto rounded-full bg-sky-200 p-6 text-center hover:bg-sky-300" onclick="nextButton()">Next</button>
            </div>
            <script src="../js/tv.js"></script>
        </body>
    </html>
</DOCTYPE>
