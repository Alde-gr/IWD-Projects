<!DOCTYPE html>
    <html>
        <head>
            <meta charset="utf-8">
            <title>TV Time | Home</title>
            <script src="https://cdn.tailwindcss.com"></script>
            <script src="https://kit.fontawesome.com/88a54f208d.js" crossorigin="anonymous"></script>
            <link rel="preconnect" href="https://fonts.googleapis.com">
            <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
            <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
            <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1.0, user-scalable=no">
        </head>
        <body class = "bg-sky-50">
            <div class="p-4">
                <nav class="container mx-auto flex rounded-full bg-sky-200 p-3">
                    <div class="container mx-auto px-4 gap-4 py-2">
                        <a class="text-xl font-semibold text-gray-800 brand-link pl-70 hover:scale-110 hover:tracking-wider transition-all" href="index.html">TV Time</a>
                    </div>
                    <button class="md:hidden items-center p-2 rounded text-gray-800 hover:bg-gray-200 ml-auto" onclick="this.nextElementSibling.classList.toggle('hidden')">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <div class="hidden md:block container mx-auto px-4 text-right gap-4 py-2">
                        <a class="text-l font-semibold text-gray-800 brand-link px-4 hover:text-blue-600" href="tv.html"><i class="fa-solid fa-film"></i>Shows</a>
                        <a class="text-l font-semibold text-gray-800 brand-link px-4 hover:text-blue-600" href="actors.html"><i class="fa-solid fa-user"></i>Actors</a>
                    </div>
                </nav>
            </div>
            <nav class="container mx-auto items-center">
                <h1 class="text-center font-bold text-xl text-gray-800">Welcome to TV Time</h1>
                <p class="text-base text-gray-800 text-center">TV Shows and Actors at a click of your mouse!</p>
            </nav>
            <div class="relative grid grid-cols-1 lg:grid-cols-2 divide-sky-300 md:divide-x divide-y md:divide-y-0 flex m-2">
                <div class="">
                    <h2 class="text-center font-bold text-lg text-gray-800">Shows</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-2 py-4 text-center m-4" id="TVResults" onSubmit="showShows()">

                    </div>
                </div>
                 <div class="">
                    <h2 class="text-center font-bold text-lg text-gray-800">Actors</h2>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-2 py-4 text-center m-4" id="ActorResults" onSubmit="showActors()">

                    </div>
                </div>
            </div>
            <script src="../js/index.js"></script>
        </body>
    </html>
</DOCTYPE>
